# Maps old fully-qualified names to new names. Drives the import renamers:
# imports, and references to the imported names, are rewritten accordingly.
# This covers modules, classes, and module-level attributes (including functions
# and classes), but NOT the content of classes (attributes and methods) — see the
# `classes` section.
#
# Each entry is `old_qualified_name: new_name`, where the new value replaces the
# LAST segment of the old name (the rest of the path is kept) unless the new
# value is itself a dotted path (then the whole tail is replaced).
#
# Order matters: renamings are applied top to bottom, so rename the nested-most
# name first. For example, to rename attribute v_old (in module x.y_old) to v_new
# while also renaming its module x.y_old to x.y_new, rename the attribute first:
# modules:
#   x.y_old.v_old: v_new        # rename the attribute (last segment only)
#   x.y_old: y_new              # then rename the module (-> x.y_new)
#
# Add nesting (x.y -> x.y.z) by giving a dotted new value:
# modules:
#   x.y: y.z
#
# Move and/or rename across packages by giving the full new import path:
# modules:
#   x.y.z: x.a.b

