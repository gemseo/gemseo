# Transforms applied to classes: attribute/method renames and method-argument
# changes. A parent class's config is also applied to its derived classes.
#
# Otherwise the value is a mapping describing the changes:
# old_class_name:
#   old_attr_name: new_attr_name             # rename an attribute (including methods)
#   old_meth_name:                           # transform a method
#     __name__: new_meth_name                # rename the method itself
#     # Argument changes. String keys are old argument names; integer keys are
#     # old positional indices (used to reposition by slot, e.g. `2: 3`).
#     # Only give a position when the argument actually moves; drop it once the
#     # argument no longer needs repositioning.
#     old_arg_name: new_arg_name             # rename argument
#     old_arg_name: new_arg_name N           # rename and reposition to index N
#     old_arg_name: N                        # reposition only to index N (integer value)
#     2: 3                                   # reposition slot 2 to slot 3 (integer key)
#     old_arg_name: null                     # remove argument
#     old_arg_name: new_arg_name={old_arg_value}_Settings    # rename and wrap value in a Settings instance
#     old_arg_name: new_arg_name=_Settings(**old_arg_value)  # rename and expand a dict value into a Settings instance

