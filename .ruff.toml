    "INP",
    "LOG",
    "Q",
    "N",
    "NPY",
    #    "PL",
    #    "PD",
    "PT",
    "PIE",
    "PGH",
    "PTH",
    "PYI",
    "PERF",
    "RET",
    "RSE",
    "RUF",
    #    "S",
    "SIM",
