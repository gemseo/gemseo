site_name: GEMSEO<sup>&reg;</sup>
site_description: GEMSEO is an open-source Python software to automate multidisciplinary processes.
site_url: https://gemseo.org

repo_name: gemseo
repo_url: https://gitlab.com/gemseo/dev/gemseo

theme:
  custom_dir: docs/overrides
  favicon: assets/images/gemseo/favicon.ico
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.path
  icon:
    repo: fontawesome/brands/gitlab
  logo: assets/images/gemseo/gemseo_white_monogram.png
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/lightbulb
        name: Switch to light mode

plugins:
  autorefs: { }
  bibtex:
    bib_file: "docs/references.bib"
    enable_inline_citations: false
  gallery:
    conf_script: docs/gallery_conf.py
    default_thumb_file: docs/assets/images/gemseo/monogram.png
  gen-files:
    scripts:
      - docs/gen_ref_nav.py
      - docs/_scripts/algos/script.py
      - docs/_scripts/credits.py
  include-markdown: { }
  literate-nav:
    nav_file: SUMMARY.md
  macros: { }
  markdown-exec: { }
  mike:
    canonical_version: latest
    # Gitlab pages expects the docs in this directory.
    deploy_prefix: public
  search: { }
  section-index: { }

nav:
  - Getting started:
      - Installation: software/installation.md
      - Tutorials:
          - GEMSEO in 10 minutes: generated/examples/tutorials/basic/plot_gemseo_in_10_minutes.md
