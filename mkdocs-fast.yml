site_name: GEMSEO<sup>&reg;</sup>
site_description: GEMSEO is an open-source Python software to automate multidisciplinary processes.
site_url: https://gemseo.org

repo_name: gemseo
repo_url: https://gitlab.com/gemseo/dev/gemseo

theme:
  custom_dir: docs/overrides
  favicon: assets/images/gemseo/favicon.ico
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.path
  icon:
    repo: fontawesome/brands/gitlab
  logo: assets/images/gemseo/gemseo_white_monogram.png
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/lightbulb
        name: Switch to light mode

plugins:
  autorefs: {}
  bibtex:
    bib_file: "docs/references.bib"
    enable_inline_citations: false
  gallery:
    conf_script: docs/gallery_conf.py
    default_thumb_file: docs/assets/images/gemseo/monogram.png
  gen-files:
    scripts:
    - docs/gen_ref_nav.py
    - docs/_scripts/algos/script.py
    - docs/_scripts/credits.py
  include-markdown: {}
  literate-nav:
    nav_file: SUMMARY.md
  macros: {}
  markdown-exec: {}
  mike:
    canonical_version: latest
    # Gitlab pages expects the docs in this directory.
    deploy_prefix: public
  search: {}
  section-index: {}

nav:
  - Getting started:
    - Installation: software/installation.md
    - Tutorials:
      - GEMSEO in 10 minutes: generated/examples/mdo/plot_gemseo_in_10_minutes.md
      - Define an MDO problem: interface/study_analysis.md
      - Optimization and DOE framework: mdo/optimization.md
      - MDO problems: generated/examples/mdo
    - Tutorials (advanced):
      - Multi-objective optimization: generated/examples/multi_objective
      - Topology optimization: generated/examples/topology_optimization
      - Ordinary differential equations (ODE): generated/examples/ode

    - Changelog: changelog.md
    - Licenses: software/licenses.md
    - Credits: credits.md
  - User guide:
    - Introduction:
      - What is MDO?: overview.md
      - Couplings: mdo/coupling.md
      - Multidisciplinary Analysis (MDA): mdo/mda.md
    - Scenario:
      - Discipline: disciplines/discipline.md
      - Design space: design_space/design_space.md
    - Formulations:
      - MDO formulations: mdo/mdo_formulations.md
    - Evaluations (DoE):
      - Design of Experiment algorithms: doe.md
    - Optimization:
      - Optimization algorithms: doe.md
    - Need for speed:
      - Global configuration: configuration.md
      - Data persistence: data_persistence/index.md
      - Cache: data_persistence/cache.md
      - Coupled derivatives and gradients computation: disciplines/jacobian_assembly.md
      - Surrogate models: surrogate.md
    - Advanced:
      - Scenario:
        - Namespaces: disciplines/namespaces.md
      - Uncertainty quantification:
        - Introduction: uncertainty/introduction.md
        - Sensitivity analysis: uncertainty/sensitivity.md
      - Ordinary differential equations:
        - Introduction: ode/introduction.md
        - Discipline: ode/ode_discipline.md
        - Problem: ode/ode_problem.md
      - Scalable models: scalable_models/original_paper.md
      - Extending: extending.md
  - How-to:
    - High-level functions: generated/examples/api
    - Cheat Sheets:
      - Available: cheat_sheets/availables.md
      - Cache: cheat_sheets/cache.md
      - Coupling: cheat_sheets/coupling.md
      - Design space: cheat_sheets/design_space.md
      - Discipline: cheat_sheets/discipline.md
      - New discipline: cheat_sheets/new_discipline.md
      - Post: cheat_sheets/post.md
      - Scenario: cheat_sheets/scenario.md
      - Surrogate: cheat_sheets/surrogate.md
    - Disciplines:
      - Interfacing simulation software: interface/software_connection.md
      - Create an analytic discipline: disciplines/analytic_discipline.md
      - Create a discipline from scratch: disciplines/discipline_from_scratch.md
      - Create an Excel discipline: interface/xls_discipline.md
      - Automatic wrapper for executables with Graphical User Interface: interface/exe_discipline.md
      - Interface with HPC job schedulers (SLURM, LSF, PBS, etc): interface/job_schedulers.md
      - Create a discipline interfacing an external executable: disciplines/discipline_interfacing_executable.md
      - Create a discipline interfacing an external executable (using GUI): interface/exe_discipline.md
      - Disciplines examples: generated/examples/disciplines
      - Surrogate discipline: generated/examples/surrogate
      - Namespaces: generated/examples/namespaces
    - Design Space: generated/examples/design_space
    - Scenario:
      - How to deal with scenarios: scenario/scenario.md
      - Monitoring the execution of a scenario: scenario/monitoring.md
      - Coupling: generated/examples/coupling
      - Study analysis: generated/examples/study_analysis
      - Scenario examples: generated/examples/scenario
      - Multi-disciplinary analysis (MDA): generated/examples/mda
      - Optimization: generated/examples/optimization_problem
      - Multi-start optimization: generated/examples/optimizers/plot_multistart_example.md
    - Design of experiments (DOE): generated/examples/doe
    - Define settings models:
      - Formulation settings:
        - Settings: settings/formulation_settings.md
        - MDO formulation examples: generated/examples/formulations
      - Algorithm settings: settings/algorithm_settings.md
      - MDA settings: settings/mda_settings.md
      - Post-processor settings: settings/post_processing_settings.md
    - Post-processing:
      - How to deal with post-processing: postprocessing/postprocessing.md
      - Dataset: generated/examples/dataset
      - Post-process an optimization problem: generated/examples/post_process
    - Machine learning: generated/examples/mlearning
    - Cache: generated/examples/cache
    - Constraint aggregation: generated/examples/constraint_aggregation
    - Scalable model: generated/examples/scalable
    - Uncertainty: generated/examples/uncertainty
    - Upgrading: software/upgrading.md
  - API: reference/gemseo/
  - References:
    - Architecture & Design:
      - The GEMSEO concepts: optimization/concepts.md
      - Machine learning: machine_learning/machine_learning_overview.md
      - Architecture principles: software/system_architecture.md
      - Architecture of MDO formulations: mdo/mdo_formulation_architecture.md
      - MDA classes organization: mdo/mda_architecture.md
      - Scalable models: scalable_models/class_diagram.md
    - Comprehensive list of tools and their settings:
      - Disciplines: algorithms/discipline_algos.md
      - DOE (design of experiments): algorithms/doe_algos.md
      - Linear solvers: algorithms/linear_solver_algos.md
      - Machine learning:
        - All: algorithms/mlearning_algos.md
        - Classification: algorithms/classification_algos.md
        - Clustering: algorithms/clustering_algos.md
        - Regression: algorithms/regression_algos.md
        - Quality: algorithms/ml_quality_algos.md
      - MDA (multidisciplinary analysis): algorithms/mda_algos.md
      - MDO formulations: algorithms/formulation_algos.md
      - ODE (ordinary differential equation) solvers: algorithms/ode_algos.md
      - Optimizers: algorithms/opt_algos.md
      - Post-processors: algorithms/post_algos.md
      - Surrogate disciplines: algorithms/surrogate_algos.md
      - Uncertainty:
        - All: algorithms/uncertainty_algos.md
        - Sensitivity analysis: algorithms/sensitivity_algos.md
        - Probability distributions: algorithms/distribution_algos.md
    - Use Cases:
        - Benchmark problems: problems/benchmark_problems.md
  - FAQ: faq.md

markdown_extensions:
- admonition
- attr_list
- footnotes
- md_in_html
- pymdownx.arithmatex:
    generic: true
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
- pymdownx.snippets
- pymdownx.tabbed:
    alternate_style: true
- toc:
    permalink: true

extra_css:
- assets/css/style.css
- assets/css/fontello.css
- assets/css/xdsmjs.css

extra_javascript:
- assets/js/mathjax.js
- assets/js/xdsmjs.js
- https://polyfill.io/v3/polyfill.min.js?features=es6
- https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

watch:
  - src/gemseo
  - README.md
  - CHANGELOG.md

extra:
  gemseo_plugins:
    gemseo-benchmark: A GEMSEO-based package to benchmark optimization algorithm.
    gemseo-bilevel-outer-approximation: GEMSEO plugin for the bi-level outer approximation (shortened as bi-level OA) algorithm.
    gemseo-calibration: Capability to calibrate GEMSEO disciplines from data.
    gemseo-fmu: GEMSEO plugin for FMU dynamic models.
    gemseo-hexaly: GEMSEO interface to Hexaly solver.
    gemseo-jax: GEMSEO plugin for JAX.
    gemseo-matlab: GEMSEO plugin for MATLAB.
    gemseo-mlearning: Miscellaneous machine learning capabilities.
    gemseo-mma: GEMSEO plugin for the MMA (Method of Moving Asymptotes) algorithm.
    gemseo-pdfo: GEMSEO plugin for the PDFO library.
    gemseo-petsc: PETSc wrapper for linear solvers and MDA.
    gemseo-pseven: GEMSEO plugin for the pSeven library.
    gemseo-pymoo: Pymoo wrapper for optimization algorithms.
    gemseo-pyoptsparse: ("GEMSEO interface to pyoptsparse algorithms.
    gemseo-ssh: SSH plugin for GEMSEO.
    gemseo-http:  GEMSEO plugin to seamlessly expose GEMSEO disciplines as HTTP RESTful web services.
    gemseo-scilab: Interfacing Scilab functions.
    gemseo-template-editor-gui: A GUI to create input and output file templates for DiscFromExe.
    gemseo-umdo: Capability for MDO under uncertainty.
  version:
    provider: mike
